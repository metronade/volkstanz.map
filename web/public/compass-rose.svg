<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    Heritage-Kompassrose im Stile historischer Kartographen (Mercator/Ortelius),
    reduziert auf Haarlinien. Keine Schatten, kein 3D — nur feine Gravur.
    Generiert für Volkstanz-Map.
  -->
  <defs>
    <!-- Feiner Spitz-Zipfel für die Hauptnadel -->
    <polygon id="vt-major-point" points="0,-110 9,0 0,110 -9,0" />
    <polygon id="vt-minor-point" points="0,-78 5,0 0,78 -5,0" />
  </defs>

  <g transform="translate(120 120)"
     fill="none"
     stroke="#2B2724"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- Äußerer Ring -->
    <circle r="115" stroke-width="1.4" />
    <circle r="108" stroke-width="0.5" stroke-opacity="0.55" />
    <circle r="98"  stroke-width="0.5" stroke-opacity="0.4" />

    <!-- Zwölfteilige Skala (alle 30°) -->
    <g stroke-width="0.8">
      <g transform="rotate(0)"><line x1="0" y1="-108" x2="0" y2="-98" /></g>
      <g transform="rotate(30)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(60)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(90)"><line x1="0" y1="-108" x2="0" y2="-98" /></g>
      <g transform="rotate(120)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(150)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(180)"><line x1="0" y1="-108" x2="0" y2="-98" /></g>
      <g transform="rotate(210)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(240)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(270)"><line x1="0" y1="-108" x2="0" y2="-98" /></g>
      <g transform="rotate(300)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
      <g transform="rotate(330)"><line x1="0" y1="-108" x2="0" y2="-100" stroke-opacity="0.5" /></g>
    </g>

    <!-- Himmelsrichtungen (Cormorant, manuell in Pfade umgewandelt) -->
    <text x="0" y="-122" text-anchor="middle" font-family="Cormorant Garamond, serif"
          font-size="16" fill="#2B2724" font-weight="600">N</text>
    <text x="125" y="6"   text-anchor="middle" font-family="Cormorant Garamond, serif"
          font-size="14" fill="#2B2724">O</text>
    <text x="0" y="135"   text-anchor="middle" font-family="Cormorant Garamond, serif"
          font-size="14" fill="#2B2724">S</text>
    <text x="-125" y="6"  text-anchor="middle" font-family="Cormorant Garamond, serif"
          font-size="14" fill="#2B2724">W</text>

    <!-- Diagonalnadeln (Altgold, halbe Länge) -->
    <g transform="rotate(45)"  stroke="#B08A3E" fill="#B08A3E">
      <use href="#vt-minor-point" />
    </g>
    <g transform="rotate(135)" stroke="#B08A3E" fill="#B08A3E">
      <use href="#vt-minor-point" />
    </g>

    <!-- Hauptnadel N-S: untere Hälfte Anthrazit -->
    <use href="#vt-major-point" fill="#2B2724" stroke="#2B2724" />
    <!-- obere Hälfte (Nord) Weinrot -->
    <polygon points="0,-110 9,0 -9,0" fill="#7A2E2E" stroke="#7A2E2E" />

    <!-- O-W-Nadel – feiner, anthrazit -->
    <g transform="rotate(90)">
      <use href="#vt-minor-point" fill="#5C544A" stroke="#5C544A" />
    </g>

    <!-- Zentrum -->
    <circle r="6" fill="#F5EFE3" stroke="#2B2724" stroke-width="1" />
    <circle r="2" fill="#2B2724" />
  </g>
</svg>
