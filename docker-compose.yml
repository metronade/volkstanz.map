name: volkstanz

services:
  # ─────────────────────────────────────────────────────────────────────
  # Postgres + PostGIS – Geo-Daten, Audit-Log, CMS-Content
  # ─────────────────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: volkstanz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ─────────────────────────────────────────────────────────────────────
  # Payload CMS – Admin-UI + REST-API
  # ─────────────────────────────────────────────────────────────────────
  cms:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: volkstanz-cms
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # development, damit Payload's drizzle-push läuft (ist in Payload 3 an
      # NODE_ENV !== 'production' gebunden). Für echtes Prod-Deployment später
      # auf 'production' umstellen + committete Migrationen via payload migrate.
      NODE_ENV: development

      # Postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      # Payload-Geheimnis (Session, JWTs)
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}

      # Routing — Admin unter ${ADMIN_PATH} erreichbar
      PUBLIC_URL: ${PUBLIC_URL_BASE:-}${ADMIN_PATH}
      SITE_URL: ${PUBLIC_URL_BASE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}

      # Initialer Admin (wird vom Seed angelegt, falls users-Tabelle leer)
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Administrator}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}

      # Auth
      AUTH_MAX_LOGIN_ATTEMPTS: ${AUTH_MAX_LOGIN_ATTEMPTS:-5}
      AUTH_LOCK_TIME: ${AUTH_LOCK_TIME:-900}

      # Rate-Limiter (Payload intern, In-Memory)
      RATE_LIMITER_POINTS: ${RATE_LIMITER_POINTS:-500}
      RATE_LIMITER_DURATION: ${RATE_LIMITER_DURATION:-60}

      # TOTP
      TOTP_ISSUER: ${TOTP_ISSUER:-Volkstanz·Map}

      # Server
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - cms_storage:/app/storage
    expose:
      - "3000"
    networks: [backend]

  # ─────────────────────────────────────────────────────────────────────
  # Astro-Frontend – SSR + statische Seiten
  # ─────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: volkstanz-web
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_started
    environment:
      PAYLOAD_URL: http://cms:3000
      PUBLIC_API_BASE: ${PUBLIC_URL_BASE:-}${ADMIN_PATH}
      SITE_URL: ${PUBLIC_URL_BASE}
      DEFAULT_LOCALE: de
      SUPPORTED_LOCALES: de,en
      ADMIN_PATH: ${ADMIN_PATH}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8095
    expose:
      - "8095"
    networks: [web, backend]

  # ─────────────────────────────────────────────────────────────────────
  # Interner Nginx-Router – ${ADMIN_PATH}/* → CMS, Rest → Web
  # Einziger Port nach außen (wird vom externen NPM angesprochen).
  # ─────────────────────────────────────────────────────────────────────
  router:
    image: nginx:1.27-alpine
    container_name: volkstanz-router
    restart: unless-stopped
    depends_on:
      - web
      - cms
    environment:
      ADMIN_PATH: ${ADMIN_PATH}
      WEB_UPSTREAM: web:8095
      CMS_UPSTREAM: cms:3000
    ports:
      - "${EXPOSED_PORT:-80}:80"
    volumes:
      - ./infra/router/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks: [web, backend]

volumes:
  db_data:
  cms_storage:

networks:
  backend:
  web:
