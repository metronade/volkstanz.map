name: volkstanz

services:
  # ─────────────────────────────────────────────────────────────────────
  # Postgres + PostGIS – Geo-Daten, Audit-Log, CMS-Content
  # ─────────────────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: volkstanz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ─────────────────────────────────────────────────────────────────────
  # Redis – Session-Cache & Rate-Limiter
  # ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: volkstanz-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks: [backend]

  # ─────────────────────────────────────────────────────────────────────
  # Directus – Headless CMS, Admin-UI, REST/GraphQL-API
  # ─────────────────────────────────────────────────────────────────────
  cms:
    image: directus/directus:11
    container_name: volkstanz-cms
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SECRET: ${DIRECTUS_SECRET}
      KEY: ${DIRECTUS_KEY}

      # DB
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      # Cache & Rate-Limiter
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      CACHE_REDIS: redis://default:${REDIS_PASSWORD}@redis:6379
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: redis
      RATE_LIMITER_REDIS: redis://default:${REDIS_PASSWORD}@redis:6379
      RATE_LIMITER_POINTS: ${RATE_LIMITER_POINTS}
      RATE_LIMITER_DURATION: ${RATE_LIMITER_DURATION}

      # Auth / Security
      AUTH_TOTP_ENABLED: "true"
      AUTH_LOCK_TIME: ${AUTH_LOCK_TIME}
      AUTH_MAX_LOGIN_ATTEMPTS: ${AUTH_MAX_LOGIN_ATTEMPTS}

      # Routing – Admin unter ${ADMIN_PATH} erreichbar
      PUBLIC_URL: ${PUBLIC_URL_BASE}${ADMIN_PATH}
      ROOT_REDIRECT: /

      # Initialer Admin
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}

      # i18n
      DEFAULT_LANGUAGE: de
      LANGUAGES: de,en

      # E-Mail (optional, für Reset-Flows)
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-sendmail}
    volumes:
      - cms_uploads:/directus/uploads
      - ./infra/cms/extensions:/directus/extensions:ro
    networks: [backend]

  # ─────────────────────────────────────────────────────────────────────
  # Astro-Frontend – SSR + statische Seiten
  # ─────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: volkstanz-web
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_started
    environment:
      DIRECTUS_URL: http://cms:8055
      PUBLIC_API_BASE: ${PUBLIC_URL_BASE}${ADMIN_PATH}
      SITE_URL: ${PUBLIC_URL_BASE}
      DEFAULT_LOCALE: de
      SUPPORTED_LOCALES: de,en
      ADMIN_PATH: ${ADMIN_PATH}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8095
    expose:
      - "8095"
    networks: [web, backend]

  # ─────────────────────────────────────────────────────────────────────
  # Interner Nginx-Router – ${ADMIN_PATH}/* → CMS, Rest → Web
  # Einziger Port nach außen (wird vom externen NPM angesprochen).
  # ─────────────────────────────────────────────────────────────────────
  router:
    image: nginx:1.27-alpine
    container_name: volkstanz-router
    restart: unless-stopped
    depends_on:
      - web
      - cms
    environment:
      ADMIN_PATH: ${ADMIN_PATH}
      WEB_UPSTREAM: web:8095
      CMS_UPSTREAM: cms:8055
    ports:
      - "${EXPOSED_PORT:-80}:80"
    volumes:
      - ./infra/router/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks: [web, backend]

volumes:
  db_data:
  redis_data:
  cms_uploads:

networks:
  backend:
  web:
